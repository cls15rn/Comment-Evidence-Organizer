<svg xmlns="http://www.w3.org/2000/svg" width="680" height="852" viewBox="0 0 680 852" role="img">
<title>아이디어 3 다섯 박자 — 문제·설계·약점·대응·확장</title>
<desc>왜 이걸, 왜 이렇게, 뭐가 약한가, 그래서 어떻게, 어디까지 자라나 다섯 박자를 세로 카드로 정리.</desc>
<style>
  text{font-family:"Noto Sans CJK KR","Noto Sans KR",sans-serif}
  .ts{font-size:12px}
  .th{font-size:14px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="0" y="0" width="680" height="852" fill="#ffffff"/>

<rect x="40" y="24" width="600" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">아이디어 3 — 다섯 박자 (다이어그램 옆 논리 주석)</text>

<rect x="40" y="80" width="600" height="86" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="60" y="104" dominant-baseline="central" fill="#0C447C">① 왜 이걸 — 문제</text>
<text class="ts" x="60" y="128" dominant-baseline="central" fill="#185FA5">혹시 모를 상황에 대비해 자료를 남겨두려는 사람의 어려움:</text>
<text class="ts" x="60" y="148" dominant-baseline="central" fill="#185FA5">증거 보존 번거로움·증발 위험 + 의미 있는 형태로 정리 막막 (대응 실행은 본인 결정)</text>
<line x1="340" y1="166" x2="340" y2="186" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="186" width="600" height="108" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="60" y="210" dominant-baseline="central" fill="#085041">② 왜 이렇게 — 설계 근거</text>
<text class="ts" x="60" y="234" dominant-baseline="central" fill="#0F6E56">· 자동수집=사찰화 → 수동 지목으로 정당성 확보</text>
<text class="ts" x="60" y="254" dominant-baseline="central" fill="#0F6E56">· 입력 세 경로(URL·공유·캡처) 벽 부딪혀 → 캡처로 수렴</text>
<text class="ts" x="60" y="274" dominant-baseline="central" fill="#0F6E56">· 시점보증 위해 해시→TSA / 판정 위험이라 관찰+면책 / 비용 위해 모델 역할분리</text>
<line x1="340" y1="294" x2="340" y2="314" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="314" width="600" height="108" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="60" y="338" dominant-baseline="central" fill="#633806">③ 뭐가 약한가 — 문제점 (솔직하게)</text>
<text class="ts" x="60" y="362" dominant-baseline="central" fill="#854F0B">· 캡처는 봉인 전 조작 가능 (우리 단계 밖)</text>
<text class="ts" x="60" y="382" dominant-baseline="central" fill="#854F0B">· 자체 해시는 시점 보증 안 됨 / 작은 모델 1차 오분류 가능</text>
<text class="ts" x="60" y="402" dominant-baseline="central" fill="#854F0B">· 진위·죄목 판정은 도구 영역 밖 (사실/허위 구분 안 함)</text>
<line x1="340" y1="422" x2="340" y2="442" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="442" width="600" height="108" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="60" y="466" dominant-baseline="central" fill="#085041">④ 그래서 어떻게 — 대응·판단 (약점과 짝)</text>
<text class="ts" x="60" y="490" dominant-baseline="central" fill="#0F6E56">· 봉인 전 조작 → 본인 지목으로 대체 / 시점 → TSA로 설계 확장</text>
<text class="ts" x="60" y="510" dominant-baseline="central" fill="#0F6E56">· 작은 모델 오분류 → 사용자 지목이 이미 보완</text>
<text class="ts" x="60" y="530" dominant-baseline="central" fill="#0F6E56">· 진위·판정 → 형식적 특징만 관찰, 판단은 사람 + 면책</text>
<line x1="340" y1="550" x2="340" y2="570" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="570" width="600" height="128" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="60" y="594" dominant-baseline="central" fill="#26215C">⑤ 어디까지 자라나 — 확장 (성장 방향 + 안 넘는 선)</text>
<text class="ts" x="60" y="618" dominant-baseline="central" fill="#534AB7">· 증거력 심화: 자체 해시 → TSA → (블록체인은 비용·법적불확실로 보류)</text>
<text class="ts" x="60" y="638" dominant-baseline="central" fill="#534AB7">· 입력 확장: 캡처 → 공유(share sheet) / 도메인 이식: 학폭·직장·스토킹</text>
<text class="ts" x="60" y="658" dominant-baseline="central" fill="#534AB7">· 비용: 대량 처리 시 모델 역할분리가 비용 선형증가 억제</text>
<text class="ts" x="60" y="680" dominant-baseline="central" fill="#854F0B">▲ 상한선: 고소장 초안 = 법률자문 경계라 의도적 제외</text>

<text class="ts" x="340" y="726" text-anchor="middle" dominant-baseline="central" fill="#73726c">①→②→③→④ 는 "문제→설계→약점→대응"이 이어지는 사슬 / ⑤는 그 위에 얹는 성장 렌즈</text>
<text class="ts" x="340" y="748" text-anchor="middle" dominant-baseline="central" fill="#73726c">관통 캐릭터: AI는 정보·정리, 판단·책임은 사람 (3·4·7·8번과 묶임)</text>

<rect x="120" y="784" width="440" height="44" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="806" text-anchor="middle" dominant-baseline="central" fill="#444441">문제점을 솔직히 적는 건 감점이 아니라 가점 — 단, "문제+판단"을 짝으로</text>
</svg>
