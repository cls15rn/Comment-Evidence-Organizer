<svg xmlns="http://www.w3.org/2000/svg" width="680" height="1014" viewBox="0 0 680 1014" role="img">
<title>악플 증거 정리 도구 통합 설계도 (대비 도구)</title>
<desc>평소 대비 도구로 재포지셔닝. 사용자 지목을 입력으로 보존·분류·정리를 자동화하고, 봉인 후 기본 비노출로 2차 노출을 줄인다. 데모 입력은 캡처 업로드, 설계 확장으로 공유 시트(사용자가 공유=지목, 네이티브 필요)를 둔다. 컨테이너는 실선, 설계 확장만 점선.</desc>
<style>
  text{font-family:"Noto Sans CJK KR","Noto Sans KR",sans-serif}
  .ts{font-size:12px}
  .th{font-size:14px;font-weight:500}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="0" y="0" width="680" height="1014" fill="#ffffff"/>

<rect x="40" y="24" width="600" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central" fill="#3C3489">모델링 철학 — AI는 정보·정리, 판단·책임은 사람</text>
<text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central" fill="#534AB7">혹시 모를 상황에 대비해 미리 봉인 · 대응 실행은 사람이 결정</text>

<line x1="150" y1="108" x2="178" y2="108" stroke="#73726c" stroke-width="1.5"/>
<text class="ts" x="184" y="108" dominant-baseline="central" fill="#73726c">데모 구현(실선)</text>
<line x1="390" y1="108" x2="418" y2="108" stroke="#73726c" stroke-width="1" stroke-dasharray="5 4"/>
<text class="ts" x="424" y="108" dominant-baseline="central" fill="#73726c">설계 확장(점선)</text>

<rect x="170" y="128" width="340" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="149" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">입력 — 사용자 지목 (사람)</text>
<text class="ts" x="340" y="170" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">캡처 업로드로 지목 · 자동수집(사찰화) 배제</text>
<rect x="524" y="128" width="116" height="60" rx="10" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="582" y="150" text-anchor="middle" dominant-baseline="central" fill="#854F0B">공유 시트</text>
<text class="ts" x="582" y="170" text-anchor="middle" dominant-baseline="central" fill="#73726c">확장 · 네이티브</text>
<line x1="524" y1="158" x2="512" y2="158" stroke="#854F0B" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<line x1="340" y1="190" x2="340" y2="212" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="214" width="600" height="170" rx="16" fill="none" stroke="#D3D1C7" stroke-width="0.75"/>
<text class="th" x="64" y="240" dominant-baseline="central" fill="#3d3d3a">① 보존·박제 — 자동화</text>
<rect x="64" y="260" width="272" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="200" y="284" text-anchor="middle" dominant-baseline="central" fill="#085041">SHA-256 해시봉인</text>
<text class="ts" x="200" y="304" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">무결성 = 안 바뀜</text>
<line x1="338" y1="292" x2="354" y2="292" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="356" y="260" width="260" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="486" y="284" text-anchor="middle" dominant-baseline="central" fill="#085041">TSA 시점보증</text>
<text class="ts" x="486" y="304" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">제3자 · 설계 확장</text>
<text class="ts" x="64" y="358" dominant-baseline="central" fill="#73726c">약함: 봉인 전 조작 → 대응: 본인 지목으로 대체 (범위 밖)</text>

<line x1="340" y1="386" x2="340" y2="410" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="412" width="600" height="170" rx="16" fill="none" stroke="#D3D1C7" stroke-width="0.75"/>
<text class="th" x="64" y="438" dominant-baseline="central" fill="#3d3d3a">② 분류 — 자동화</text>
<rect x="64" y="458" width="272" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="200" y="482" text-anchor="middle" dominant-baseline="central" fill="#3C3489">작은 모델 1차 거름</text>
<text class="ts" x="200" y="502" text-anchor="middle" dominant-baseline="central" fill="#534AB7">쉬운 분류 · 비용↓</text>
<line x1="338" y1="490" x2="354" y2="490" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="356" y="458" width="260" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="486" y="482" text-anchor="middle" dominant-baseline="central" fill="#3C3489">큰 모델 근거 생성</text>
<text class="ts" x="486" y="502" text-anchor="middle" dominant-baseline="central" fill="#534AB7">형식적 특징만 관찰</text>
<text class="ts" x="64" y="556" dominant-baseline="central" fill="#73726c">약함: 진위·죄목 판정 불가 → 대응: 관찰만 + 면책, 판단은 사람</text>

<line x1="340" y1="584" x2="340" y2="608" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="610" width="600" height="212" rx="16" fill="none" stroke="#D3D1C7" stroke-width="0.75"/>
<text class="th" x="64" y="636" dominant-baseline="central" fill="#3d3d3a">③ 정리 — 한 데이터, 세 가지 뷰</text>
<rect x="64" y="656" width="176" height="68" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="152" y="680" text-anchor="middle" dominant-baseline="central" fill="#712B13">증거표</text>
<text class="ts" x="152" y="702" text-anchor="middle" dominant-baseline="central" fill="#993C1D">CSV+PDF · 제출용</text>
<rect x="252" y="656" width="176" height="68" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="680" text-anchor="middle" dominant-baseline="central" fill="#712B13">타임라인</text>
<text class="ts" x="340" y="702" text-anchor="middle" dominant-baseline="central" fill="#993C1D">반복성 입증</text>
<rect x="440" y="656" width="176" height="68" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="528" y="680" text-anchor="middle" dominant-baseline="central" fill="#712B13">죄목별</text>
<text class="ts" x="528" y="702" text-anchor="middle" dominant-baseline="central" fill="#993C1D">소지+근거+면책</text>
<text class="ts" x="64" y="752" dominant-baseline="central" fill="#73726c">출력: 한 번 정리 → 세 렌즈 (출력 늘어도 비용 거의 안 늘어)</text>
<text class="ts" x="64" y="774" dominant-baseline="central" fill="#73726c">주의: 동일 ID 반복은 표시(관찰) / 다른 ID 동일인 추정은 안 함</text>
<text class="ts" x="64" y="796" dominant-baseline="central" fill="#73726c">저장 ≠ 열람: 봉인 후 기본 비노출 (반복 정독은 도구가 대신)</text>

<line x1="340" y1="824" x2="340" y2="848" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="150" y="850" width="380" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="871" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">평소 대비 (필요시 대응)</text>
<text class="ts" x="340" y="892" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">미리 봉인·정리 → 필요할 때 사용자가 꺼내 대응</text>

<rect x="40" y="934" width="600" height="60" rx="12" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="64" y="956" dominant-baseline="central" fill="#854F0B">확장 — 어디까지 자라나</text>
<text class="ts" x="64" y="978" dominant-baseline="central" fill="#73726c">도메인 이식: 학폭·직장·스토킹 / 상한선: 고소장 초안 = 법률자문 경계라 제외</text>
</svg>
